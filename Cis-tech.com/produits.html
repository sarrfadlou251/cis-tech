<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produits | CIS-TECH</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="Images/logo.jpeg" />
</head>

<body>

  <header id="header">
    <div class="header-inner">
      <button class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
      <a href="index.html" class="logo" id="logoWrap"></a>
      <button class="cart-btn" onclick="toggleCart()">
        🛒 <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <nav class="mobile-menu" id="mobileMenu">
    <button class="close-menu" onclick="toggleMenu()">✕</button>
    <ul>
      <li><a href="index.html" onclick="toggleMenu()">Accueil</a></li>
      <li><a href="produits.html" onclick="toggleMenu()">Produits</a></li>
      <li><a href="collections.html" onclick="toggleMenu()">Collections</a></li>
      <li><a href="apropos.html" onclick="toggleMenu()">À propos</a></li>
    </ul>
  </nav>
  <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

  <!-- PAGE TITLE -->
  <div class="page-hero">
    <div class="container">
      <p class="breadcrumb"><a href="index.html">Accueil</a> → Produits</p>
      <h1 class="page-title">Nos Produits</h1>
    </div>
  </div>

  <!-- PRODUITS -->
  <section class="section">
    <div class="container">
      <div class="filter-bar-wrap">
        <div class="filter-bar" id="filterBar"></div>
      </div>
      <div class="products-grid" id="productsGrid"></div>
    </div>
  </section>

  <!-- PANIER -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>🛒 Mon panier</h3>
      <button onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <p class="cart-empty">Votre panier est vide</p>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total"><span>Total :</span><strong id="cartTotal">0 CFA</strong></div>
      <button class="whatsapp-btn" onclick="commanderWhatsApp()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
          <path
            d="M12 0C5.373 0 0 5.373 0 12c0 2.124.554 4.121 1.524 5.855L.057 23.492a.5.5 0 0 0 .624.606l5.807-1.523A11.953 11.953 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.885 0-3.652-.523-5.162-1.43l-.361-.215-3.746.982.999-3.648-.235-.374A9.96 9.96 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z" />
        </svg>
        Commander sur WhatsApp
      </button>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
  <div class="modal" id="productModal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      updateCartUI();

      // Filtres dynamiques depuis les catégories
      const cats = ['tous', ...new Set(PRODUCTS.map(p => p.category))];
      const filterBar = document.getElementById('filterBar');
      filterBar.innerHTML = cats.map(c => `
        <button class="filter-btn ${c === 'tous' ? 'active' : ''}" onclick="filterProducts('${c}', this)">
          ${c === 'tous' ? 'Tous' : getCategoryLabel(c)}
        </button>
      `).join('');

      renderProductCards(PRODUCTS, 'productsGrid');
    });

    function filterProducts(cat, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filtered = cat === 'tous' ? PRODUCTS : PRODUCTS.filter(p => p.category === cat);
      renderProductCards(filtered, 'productsGrid');
    }
  </script>
</body>

</html>
